<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenLayers Map with GaoDe Basemap</title>
    <link rel="stylesheet" href="https://openlayers.org/en/latest/css/ol.css" type="text/css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }
        #map {
            width: 100vw;
            height: 100vh;
        }
        .controls {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
        }
        .search-box {
            margin-bottom: 10px;
        }
        .map-type-switcher {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 1000;
        }
    </style>
    <script src="https://openlayers.org/en/latest/build/ol.js"></script>
</head>
<body>

<div class="controls">
    <input type="text" class="search-box" placeholder="Search location...")>
</div>
<div id="map"></div>
<div class="map-type-switcher">
    <button id="street">Street</button>
    <button id="satellite">Satellite</button>
</div>

<script>
    var map = new ol.Map({
        target: 'map',
        layers: [
            new ol.layer.Tile({
                source: new ol.source.XYZ({
                    url: 'https://webrd02.is.autonavi.com/appmaptile?styles=6&x={x}&y={y}&z={z}'
                })
            })
        ],
        view: new ol.View({
            center: ol.proj.fromLonLat([104, 30.5]),
            zoom: 8
        })
    });

    document.getElementById('street').onclick = function() {
        map.getLayers().item(0).setSource(new ol.source.XYZ({
            url: 'https://webrd02.is.autonavi.com/appmaptile?styles=6&x={x}&y={y}&z={z}'
        }));
    };

    document.getElementById('satellite').onclick = function() {
        map.getLayers().item(0).setSource(new ol.source.XYZ({
            url: 'https://webrd02.is.autonavi.com/appmaptile?styles=8&x={x}&y={y}&z={z}'
        }));
    };
</script>
</body>
</html>
